<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таймер</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background-color: #0f172a; background-size: cover; background-position: center;
    background-repeat: no-repeat; color: #fff; overflow-x: hidden; transition: background 0.3s;
  }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; text-align: center; padding: 20px; width: 100%; max-width: 1200px; }

  .timer {
    display: flex; justify-content: center; align-items: center;
    gap: 15px; flex-wrap: wrap; padding: 40px 30px; border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    user-select: none;
  }
  .timer-unit { display: flex; flex-direction: column; align-items: center; min-width: 90px; }
  .timer-value { font-size: 72px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; color: #fff; }
  .timer-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; margin-top: 10px; color: #fff; }
  .timer-separator { font-size: 60px; font-weight: 300; opacity: 0.5; padding-bottom: 30px; }

  .size-small .timer-value { font-size: 40px; }
  .size-small .timer-label { font-size: 11px; }
  .size-small .timer-separator { font-size: 34px; }
  .size-small .timer-unit { min-width: 60px; }
  .size-medium .timer-value { font-size: 72px; }
  .size-medium .timer-label { font-size: 14px; }
  .size-medium .timer-separator { font-size: 60px; }
  .size-large .timer-value { font-size: 110px; }
  .size-large .timer-label { font-size: 18px; }
  .size-large .timer-separator { font-size: 90px; }
  .size-large .timer-unit { min-width: 140px; }

  .style-classic { background: rgba(255,255,255,0.08); }
  .style-glass {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .style-minimal { background: transparent; border: none; backdrop-filter: none; -webkit-backdrop-filter: none; }
  .style-bold .timer-value { font-weight: 900; letter-spacing: -2px; }
  .labels-hidden .timer-label { display: none; }

  .expired-content { text-align: center; padding: 40px; animation: fadeIn 0.6s ease; }
  .expired-content img { max-width: 100%; max-height: 60vh; border-radius: 16px; margin-bottom: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .expired-content h1 { font-size: 48px; margin-bottom: 20px; font-weight: 700; }
  .expired-content a.btn {
    display: inline-block; padding: 16px 40px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; text-decoration: none; border-radius: 12px;
    font-size: 18px; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 10px 30px rgba(99,102,241,0.4);
  }
  .expired-content a.btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(99,102,241,0.6); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    .size-large .timer-value { font-size: 60px; }
    .size-large .timer-separator { font-size: 50px; }
    .size-large .timer-unit { min-width: 70px; }
    .timer { padding: 25px 15px; gap: 8px; }
    .expired-content h1 { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
  <div id="timerView" class="timer size-medium style-glass">
    <div class="timer-unit"><div class="timer-value" id="days">00</div><div class="timer-label">Дней</div></div>
    <div class="timer-separator">:</div>
    <div class="timer-unit"><div class="timer-value" id="hours">00</div><div class="timer-label">Часов</div></div>
    <div class="timer-separator">:</div>
    <div class="timer-unit"><div class="timer-value" id="minutes">00</div><div class="timer-label">Минут</div></div>
    <div class="timer-separator">:</div>
    <div class="timer-unit"><div class="timer-value" id="seconds">00</div><div class="timer-label">Секунд</div></div>
  </div>
  <div id="expiredView" class="expired-content" style="display:none;"></div>
</div>

<script>
const DEFAULT_CONFIG = {
  endDate: new Date(Date.now() + 24*60*60*1000).toISOString().slice(0,16),
  expiredImage: "", expiredText: "Время вышло!", expiredLink: "", expiredLinkText: "Перейти",
  bgColor: "#0f172a", bgImage: "", digitColor: "#ffffff", labelColor: "#ffffff",
  size: "medium", style: "glass", labels: "show",
  timerBgColor: "#ffffff", timerBgOpacity: 0.08,
  adminPasswordHash: "", jsonbinId: "", jsonbinKey: ""
};

let config = { ...DEFAULT_CONFIG };
let timerInterval = null;

async function loadConfig() {
  try {
    const resp = await fetch('config.json?v=' + Date.now(), { cache: 'no-store' });
    if (resp.ok) {
      const data = await resp.json();
      config = { ...DEFAULT_CONFIG, ...data };
    }
  } catch (e) {
    config = { ...DEFAULT_CONFIG };
  }
  applyConfig();
  if (config.jsonbinId && config.jsonbinKey) trackVisitor();
}

async function getCityFromIP(ip) {
  try {
    const resp = await fetch(`https://ipwho.is/${ip}?lang=ru`);
    if (resp.ok) {
      const data = await resp.json();
      if (data.success !== false) return data.city || data.region || data.country || 'Неизвестно';
    }
  } catch(e) {}
  try {
    const resp = await fetch(`https://ipinfo.io/${ip}/json`);
    if (resp.ok) {
      const data = await resp.json();
      if (data.city) return data.city;
    }
  } catch(e) {}
  return 'Неизвестно';
}

async function trackVisitor() {
  if (sessionStorage.getItem('visitor_tracked')) return;
  try {
    const ipResp = await fetch('https://api.ipify.org?format=json');
    if (!ipResp.ok) return;
    const ipData = await ipResp.json();
    const ip = ipData.ip;
    const city = await getCityFromIP(ip);
    const device = parseUserAgent(navigator.userAgent);

    const visitor = {
      ip: ip, city: city,
      time: new Date().toISOString(),
      device: device,
      url: window.location.href
    };

    const getResp = await fetch(`https://api.jsonbin.io/v3/b/${config.jsonbinId}/latest`, {
      headers: { 'X-Master-Key': config.jsonbinKey }
    });
    let visitors = [];
    if (getResp.ok) {
      const data = await getResp.json();
      visitors = (data.record && data.record.visitors) || [];
    }
    visitors.push(visitor);
    if (visitors.length > 500) visitors = visitors.slice(visitors.length - 500);

    await fetch(`https://api.jsonbin.io/v3/b/${config.jsonbinId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': config.jsonbinKey },
      body: JSON.stringify({ visitors: visitors })
    });
    sessionStorage.setItem('visitor_tracked', '1');
  } catch (e) {}
}

function parseUserAgent(ua) {
  let os = 'Неизвестно', browser = 'Неизвестно';
  if (/Windows NT 10/.test(ua)) os = 'Windows 10/11';
  else if (/Windows NT 6\.3/.test(ua)) os = 'Windows 8.1';
  else if (/Windows NT 6\.1/.test(ua)) os = 'Windows 7';
  else if (/Windows/.test(ua)) os = 'Windows';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/iPhone|iPad|iPod/.test(ua)) os = 'iOS';
  else if (/Mac OS X/.test(ua)) os = 'macOS';
  else if (/Linux/.test(ua)) os = 'Linux';
  if (/Edg\//.test(ua)) browser = 'Edge';
  else if (/OPR\//.test(ua) || /Opera/.test(ua)) browser = 'Opera';
  else if (/YaBrowser/.test(ua)) browser = 'Яндекс';
  else if (/Firefox\//.test(ua)) browser = 'Firefox';
  else if (/Chrome\//.test(ua)) browser = 'Chrome';
  else if (/Safari\//.test(ua)) browser = 'Safari';
  return `${browser} · ${os}`;
}

function applyConfig() {
  document.body.style.backgroundColor = config.bgColor || '#0f172a';
  document.body.style.backgroundImage = config.bgImage ? `url("${config.bgImage}")` : 'none';
  const timer = document.getElementById('timerView');
  timer.className = 'timer';
  timer.classList.add('size-' + (config.size || 'medium'));
  timer.classList.add('style-' + (config.style || 'glass'));
  if (config.labels === 'hide') timer.classList.add('labels-hidden');
  const r = parseInt(config.timerBgColor.slice(1,3),16);
  const g = parseInt(config.timerBgColor.slice(3,5),16);
  const b = parseInt(config.timerBgColor.slice(5,7),16);
  const op = parseFloat(config.timerBgOpacity || 0.08);
  timer.style.background = `rgba(${r},${g},${b},${op})`;
  document.querySelectorAll('.timer-value').forEach(el => el.style.color = config.digitColor || '#fff');
  document.querySelectorAll('.timer-label').forEach(el => el.style.color = config.labelColor || '#fff');
  document.querySelectorAll('.timer-separator').forEach(el => el.style.color = config.digitColor || '#fff');
  startTimer();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const end = new Date(config.endDate).getTime();
  if (isNaN(end)) { showExpired(); return; }
  function tick() {
    const now = Date.now();
    const diff = end - now;
    if (diff <= 0) { showExpired(); clearInterval(timerInterval); return; }
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((diff % (1000*60)) / 1000);
    document.getElementById('days').textContent = String(days).padStart(2,'0');
    document.getElementById('hours').textContent = String(hours).padStart(2,'0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2,'0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2,'0');
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function showExpired() {
  document.getElementById('timerView').style.display = 'none';
  const exp = document.getElementById('expiredView');
  exp.style.display = 'block';
  let html = '';
  if (config.expiredImage) html += `<img src="${escapeHtml(config.expiredImage)}" alt="">`;
  if (config.expiredText) html += `<h1 style="color:${config.digitColor || '#fff'}">${escapeHtml(config.expiredText)}</h1>`;
  if (config.expiredLink) html += `<a class="btn" href="${escapeHtml(config.expiredLink)}" target="_blank" rel="noopener">${escapeHtml(config.expiredLinkText || 'Перейти')}</a>`;
  exp.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadConfig();
</script>
</body>
</html>
